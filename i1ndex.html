<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Deteksi Tangan - HTML</title>
<style>
  body {
    margin: 0;
    background: #111;
    color: #eee;
    font-family: Arial, sans-serif;
    text-align: center;
  }
  h2 { margin: 16px 0 8px; }
  .container {
    position: relative;
    width: 640px;
    height: 480px;
    margin: 0 auto;
  }
  video, canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 640px;
    height: 480px;
  }
  #info {
    margin-top: 10px;
    font-size: 18px;
    color: #4CAF50;
  }
</style>
</head>
<body>

<h2>Deteksi Tangan Real-Time (HTML + MediaPipe)</h2>
<div class="container">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
</div>
<p id="info">Mengaktifkan kamera...</p>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script>
const videoElement = document.getElementById('video');
const canvasElement = document.getElementById('canvas');
const canvasCtx = canvasElement.getContext('2d');
const infoText = document.getElementById('info');

canvasElement.width = 640;
canvasElement.height = 480;

const hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

hands.onResults((results) => {
  canvasCtx.save();
  canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
  canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    for (const landmarks of results.multiHandLandmarks) {
      drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, { color: '#00FF00', lineWidth: 3 });
      drawLandmarks(canvasCtx, landmarks, { color: '#FF0000', lineWidth: 1, radius: 4 });
    }
    infoText.innerText = `Tangan terdeteksi: ${results.multiHandLandmarks.length}`;
  } else {
    infoText.innerText = "Tidak ada tangan terdeteksi";
  }

  canvasCtx.restore();
});

const camera = new Camera(videoElement, {
  onFrame: async () => {
    await hands.send({ image: videoElement });
  },
  width: 640,
  height: 480
});

camera.start();
</script>

</body>
</html>
